name: V-Shop Voucher AI CI Pipeline

on:
  push:
    [cite_start]branches: [ main, 'feature/voucher-ai' ] # Tự động kích hoạt khi push code Voucher AI 

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run Unit Tests
        run: |
          python -m unittest test_voucher.py
        # Nếu test thất bại, GitHub Actions sẽ đánh dấu ĐỎ và dừng toàn bộ tiến trình 

      - name: Packaging Release Candidate
        [cite_start]if: success() # Chỉ chạy nếu bước test báo XANH 
        run: |
          echo "Packaging Release Candidate for V-Shop 12/12..."
          mkdir release
          tar -czvf release/VShop_VoucherAI_RC.tar.gz .
